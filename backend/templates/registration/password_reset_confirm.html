<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* Page Banner Styles */
        .page-banner-area {
            background-color: #007bff;
            color: white;
            padding: 40px 0;
            margin-bottom: 20px;
        }

        .page-banner-content h4 {
            margin: 0;
            font-size: 36px;
            font-weight: 600;
        }

        .breadcrumb-menu {
            list-style: none;
            padding: 0;
            margin: 10px 0 0;
        }

        .breadcrumb-menu li {
            display: inline;
            color: white;
        }

        .breadcrumb-menu li a {
            color: white;
            text-decoration: none;
        }

        .breadcrumb-menu li:not(:last-child)::after {
            content: " > ";
            padding: 0 5px;
        }

        /* Account Area Styles */
        .account-area {
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h5 {
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 20px;
            text-align: center;
        }

        .basic-login {
            background-color: #fff;
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .basic-login form {
            display: flex;
            flex-direction: column;
        }

        .basic-login label {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .basic-login p {
            margin-bottom: 15px;
        }

        .basic-login input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            width: 100%;
        }

        .tp-in-btn {
            background-color: #007bff;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
        }

        .tp-in-btn:hover {
            background-color: #0056b3;
        }

        /* Error Message */
        .error {
            color: red;
            font-size: 14px;
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            .col-lg-6 {
                width: 100%;
            }

            h5 {
                font-size: 24px;
            }

            .page-banner-content h4 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- page-banner-area-start -->
    <div class="page-banner-area">
        <div class="container">
            <div class="row">
                <div class="col-xl-12">
                    <div class="page-banner-content text-center">
                        <h4 class="breadcrumb-title">Password Reset</h4>
                        <div class="breadcrumb-two">
                            <nav>
                               <nav class="breadcrumb-trail breadcrumbs">
                                  <ul class="breadcrumb-menu">
                                     <li class="breadcrumb-trail">
                                        <a href="{% url 'home' %}"><span>Home</span></a>
                                     </li>
                                     <li class="trail-item">
                                        <span>Password reset</span>
                                     </li>
                                  </ul>
                               </nav>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- page-banner-area-end -->

    <!-- account-area-start -->
    <div class="account-area mt-70 mb-70">
        <div class="container">
            <div class="row">
                <div class="col-lg-6 mx-auto">
                    <div class="basic-login mb-50">
                        <h5 class="display-4">New Password</h5>
                        <hr>
                        {% if validlink %}
                        <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="form-group">
                            <label>{{ field.label_tag }}</label>
                            <p>{{ field }}</p>
                            {{ field.errors }}
                        </div>
                        {% endfor %}
                        <button type="submit" class="tp-in-btn w-100">Save</button>
                        </form>
                        {% else %}
                        <p style="color:red">Invalid Token</p>
                        <p>
                         <a href="{% url 'password_reset' %}">
                             Request a new password reset token
                         </a>
                        </p>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- account-area-end -->
</body>
</html>
