<!DOCTYPE html>
<html lang="en">

<head>
  {% load widget_tweaks %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm4r1nEycI2uTppfSU6zD4fqCZfIsZALxuXnGOz9BweYl5nain" crossorigin="anonymous">

    <!-- Popper.js & Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
</head>

<body style="background-color: #f8f9fa; font-family: Arial, sans-serif;">

    <!-- Page Banner Section Start -->
    <div style="background-color: #343a40; padding: 50px 0; text-align: center; color: white;">
        <div class="container">
            <h4 style="font-size: 2rem; margin-bottom: 10px;">Password Reset</h4>
            <nav class="breadcrumb-trail breadcrumbs" style="display: inline-block; background: none; padding: 0;">
                <ul class="breadcrumb" style="background: none; padding: 0; margin: 0; list-style: none;">
                    <li class="breadcrumb-item" style="display: inline; font-size: 1rem;">
                        <a href="{% url 'home' %}" style="color: white; text-decoration: none;">Home</a>
                    </li>
                    <li class="breadcrumb-item active" aria-current="page" style="display: inline; font-size: 1rem;">Password Reset</li>
                </ul>
            </nav>
        </div>
    </div>
    <!-- Page Banner Section End -->

    <!-- Account Section Start -->
    <div class="account-area" style="padding: 50px 0;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">
                    <div class="card shadow" style="border-radius: 10px; border: none;">
                        <div class="card-body" style="padding: 40px;">
                            <h5 class="card-title text-center" style="font-size: 1.75rem; font-weight: bold; margin-bottom: 30px;">Forgot Password</h5>
                            <hr style="margin-bottom: 30px;">

                            <form method="post">
                                {% csrf_token %}
                                {% for field in form %}
                                    <div class="mb-3">
                                        <label style="font-size: 1.1rem; font-weight: 500;">{{ field.label }}</label>
                                        <div>
                                            {{ field|add_class:"form-control" }} <!-- Make the field look like a form control -->
                                            <div class="text-danger" style="font-size: 0.875rem; margin-top: 5px;">{{ field.errors }}</div>
                                        </div>
                                    </div>
                                {% endfor %}
                                
                                <button type="submit" class="btn btn-primary w-100" style="padding: 12px; font-size: 1.1rem; border-radius: 5px;">Send Confirmation Link</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Account Section End -->

</body>

</html>
