<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        .table th, .table td {
            padding: 20px; /* Adjust the padding as needed */
        }
        .table-bordered {
            border: 1px solid #ccc; /* Border for the table */
        }
        .table-bordered th, .table-bordered td {
            border: 1px solid #ccc; /* Border for table cells */
        }
        .record {
            padding: 10px;
            border: none; /* Remove cell borders */
        }
        .label {
            text-align: right; /* Align labels to the right */
            padding-right: 10px; /* Space between label and value */
        }
        .value {
            text-align: left; /* Align values to the left */
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body style="font-family: Arial, sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px;">
    <div style="max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">
                <a style="color: #f0e7e7; margin: 0;" href="{% url 'student' %}">Add Student</a>
            </div>
            <h1 style="color: #333; margin: 0;">Welcome to Your Home Page!</h1>
            <!-- Logout Button -->
            <form action="{% url 'logout' %}" method="POST">
                {% csrf_token %}
                <button type="submit" style="background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">
                    Log Out
                </button>
            </form>
        </div>
    </div>
    <br>

    <div style="max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); text-align: center;"></div>
    <br>
    <div class="container full-height">
        <div class="row">
            <div class="col-md-6 offset-md-3" style="background: white; padding: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); text-align: center;">
                <div style="font-family: inkfree; font-size: 30px;"><h2>Student Records</h2></div>
                <br>
                <div style="text-align: center;">
                    <table class="table table-bordered" style="margin: 0 auto;">
                        <tbody>
                            <!-- Loop through students if you have multiple -->
                         
                            <tr>
                                <td class="label">ID</td>
                                <td class="value">{{ student.id }}</td>
                            </tr>
                            <tr>
                                <td class="label">NAME</td>
                                <td class="value">{{ student.name }}</td>
                            </tr>
                            <tr>
                                <td class="label">EMAIL</td>
                                <td class="value">{{ student.email }}</td>
                            </tr>
                            <tr>
                                <td class="label">PHONE</td>
                                <td class="value">{{ student.phone }}</td>
                            </tr>
                            <tr>
                                <td class="label">CITY</td>
                                <td class="value">{{ student.city }}</td>
                            </tr>
                            
                           
                        </tbody>
                        
                    </table>
                    
                    <form action="{% url 'delete_student' student.id %}" method="POST" onsubmit="return confirm('Are you sure you want to delete this student?');">
                        <button type="button" style="background-color: #ffc107; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">
                            <a href="{% url 'edit_student' student.id %}" style="color: white; text-decoration: none;">Edit Student</a>
                        </button>
                        <button type="submit" style="background-color: rgb(89, 211, 7); color: rgb(240, 10, 10); border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;"><a href="{% url 'home' %}">Back</a></button>
                        {% csrf_token %}
                        <button type="submit" style="background-color: red; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">
                            Delete Student
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <br>
</body>
</html>
