{% extends 'base.html' %}

{% block content %}

    <h1>Customer Record</h1>

    Name = {{customer_record.first_name}}
    
    {{customer_record.last_name}}
    <br>
    Email = {{customer_record.email}}
    <br>
    Phone = {{customer_record.phone}}
    <br>
    City = {{customer_record.city}}

    <div>
        <button type="submit"><a href="{% url 'home' %}">Back</a></button>

    </div>


</div>


{% endblock %}
